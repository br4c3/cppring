repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: cmake-configure
        name: cmake configure
        entry: cmake -S . -B build/precommit -DCMAKE_BUILD_TYPE=Debug
        language: system
        pass_filenames: false

      - id: cmake-build
        name: cmake build
        entry: cmake --build build/precommit
        language: system
        pass_filenames: false

      - id: ctest
        name: ctest
        entry: ctest --test-dir build/precommit --output-on-failure
        language: system
        pass_filenames: false
